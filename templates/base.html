<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title|default("ISEHUB") }}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root{
      --accent:#a68bf0;
      --glass:rgba(255,255,255,0.18);
    }
    body{
      background:linear-gradient(135deg,#f1e7ff,#e0f0ff,#ffe3f3);
      min-height:100vh;
      font-family:Inter,Arial;
    }
    .glass-box{
      backdrop-filter:blur(15px);
      background:var(--glass);
      padding:25px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:0 8px 40px rgba(0,0,0,0.08);
    }
    .accent-btn{
      background:var(--accent);
      color:white;
      border-radius:10px;
      padding:8px 16px;
      text-decoration:none;
    }
  </style>
</head>

<body class="p-4">
  <div class="container">
    <div class="glass-box">

      <div class="d-flex justify-content-between mb-4">
        <h3>ISEHUB</h3>

        <div>
          {% if session.get('is_admin') %}
    <a href="{{ url_for('admin_dashboard') }}" class="me-3">Admin</a>
    <a href="{{ url_for('logout') }}" class="accent-btn">Logout</a>

          {% elif session.get('student_usn') %}
    <a href="{{ url_for('student_dashboard') }}" class="me-3">Student</a>
    <a href="{{ url_for('logout') }}" class="accent-btn">Logout</a>

{% else %}
    <a href="{{ url_for('login') }}" class="accent-btn">Login</a>
{% endif %}

        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=True) %}
        {% for cat,msg in messages %}
          <div class="alert alert-{{cat}}">{{msg}}</div>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}
{% block content %}

<div class="tile">
    <h3 style="color:#6b4fcc">Upload Notes</h3>

    <form method="POST" enctype="multipart/form-data" class="mt-3">

        <div class="mb-3">
            <label>Subject</label>
            <select name="subject" class="form-control" required>
                {% for key, sub in subject_data.items() %}
                    <option value="{{ key }}">{{ sub.title }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label>Upload File</label>
            <!-- IMPORTANT NAME!! -->
            <input type="file" name="note_file" class="form-control" required>
        </div>

        <button class="accent-btn">Upload</button>
    </form>
</div>

<div class="tile mt-4">
    <h3 style="color:#6b4fcc">Notes List</h3>

    {% if notes %}
        <ul class="list-group mt-3">
            {% for n in notes %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>{{ n.title }}</strong><br>
                        <small>{{ n.subject }} — {{ n.created_at }}</small>
                    </div>

                    <div>
                        <a class="btn btn-sm btn-primary"
                           href="/uploads/notes/{{ n.filename }}"
                           download>
                           Download
                        </a>

                        <form method="POST"
                              action="{{ url_for('admin_delete_note', nid=n.id) }}"
                              style="display:inline-block">
                            <button class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="small-muted mt-3">No notes uploaded.</p>
    {% endif %}
</div>

{% endblock %}

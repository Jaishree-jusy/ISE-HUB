{% extends "base.html" %}
{% block content %}

<div class="tile mb-4">
    <h3 style="color:#3b2f76">Upload Assignment</h3>

    <form method="POST" enctype="multipart/form-data" class="mt-3">

        <div class="mb-3">
            <label>Title</label>
            <input name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label>Deadline</label>
            <input type="date" name="deadline" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Upload File</label>
            <input type="file" name="assignment_file" class="form-control" required>
        </div>

        <button type="submit"
        class="accent-btn">Upload</button>
    </form>
</div>


<div class="tile">
    <h3 style="color:#3b2f76">Assignments List</h3>

    {% if assignments %}
        <table class="table table-hover mt-3">
            <tr>
                <th>Title</th>
                <th>Deadline</th>
                <th>File</th>
                <th>Submissions</th>
                <th>Action</th>
            </tr>

            {% for a in assignments %}
            <tr>
                <td>{{ a.title }}</td>
                <td>{{ a.deadline }}</td>

                <td>
                    <a href="/files/admin/{{ a.file }}" target="_blank">Download</a>
                </td>

                <td>
                    <a href="{{ url_for('admin_view_submissions', aid=a.id) }}">View</a>
                </td>

                <td>
                    <form method="POST" action="{{ url_for('admin_delete_assignment', aid=a.id) }}">
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

    {% else %}
        <div class="small-muted mt-3">No assignments uploaded.</div>
    {% endif %}
</div>

{% endblock %}

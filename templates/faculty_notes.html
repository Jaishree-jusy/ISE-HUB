{% extends "base.html" %}
{% block content %}

<style>
    .upload-box {
        background:rgba(255,255,255,0.85);
        padding:22px;
        border-radius:16px;
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .note-card {
        background:white;
        padding:14px;
        border-radius:12px;
        margin-bottom:12px;
        box-shadow:0 6px 18px rgba(0,0,0,0.05);
    }

    .upload-btn {
        background:#b19cd9;
        padding:8px 16px;
        border-radius:12px;
        color:white;
        border:none;
    }
</style>

<h2 style="color:#5c5c8a;font-weight:800;">Manage Notes</h2>

<div class="upload-box mt-3">
<form method="POST" enctype="multipart/form-data">
    <label>Title</label>
    <input class="form-control" name="title" required>

    <label class="mt-2">Subject</label>
    <select class="form-control" name="subject" required>
        {% for key, obj in subjects.items() %}
        <option value="{{ key }}">{{ obj.title }}</option>
        {% endfor %}
    </select>

    <label class="mt-2">Upload File</label>
    <input class="form-control" type="file" name="file" required>

    <button class="upload-btn mt-3">Upload</button>
</form>
</div>

<h3 class="mt-4" style="color:#5c5c8a;">Uploaded Notes</h3>

{% for n in notes %}
<div class="note-card">
    <strong>{{ n.title }}</strong><br>
    <small>{{ n.subject }} — {{ n.created_at }}</small><br>
    <a href="/uploads/notes/{{ n.file }}" download>Download</a>
</div>
{% endfor %}

{% endblock %}
